
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易倒计时</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    background:#0a0e17;
    color:#c8d6e5;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 16px 60px;
  }
  h1{
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    margin-bottom:6px;
    background:linear-gradient(135deg,#e74c3c,#f39c12);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .subtitle{
    font-size:13px;
    color:#576574;
    margin-bottom:28px;
  }
  .clock{
    font-size:42px;
    font-weight:300;
    letter-spacing:4px;
    color:#f5f6fa;
    margin-bottom:8px;
    font-variant-numeric:tabular-nums;
  }
  .date-info{
    font-size:13px;
    color:#576574;
    margin-bottom:32px;
  }
  .market-status{
    display:inline-block;
    padding:5px 18px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
    margin-bottom:30px;
    letter-spacing:1px;
  }
  .status-trading{background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
  .status-auction{background:rgba(243,156,18,.15);color:#f39c12;border:1px solid rgba(243,156,18,.3)}
  .status-closed{background:rgba(99,110,114,.15);color:#636e72;border:1px solid rgba(99,110,114,.3)}
  .status-break{background:rgba(108,92,231,.15);color:#6c5ce7;border:1px solid rgba(108,92,231,.3)}

  .debug-panel{
    background:rgba(243,156,18,.08);
    border:1px solid rgba(243,156,18,.25);
    border-radius:10px;
    padding:10px 18px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:#f39c12;
    flex-wrap:wrap;
    justify-content:center;
  }
  .debug-panel label{white-space:nowrap}
  .debug-panel input[type="time"]{
    background:#131926;
    border:1px solid rgba(243,156,18,.3);
    color:#f5f6fa;
    padding:5px 10px;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
    outline:none;
  }
  .debug-panel input[type="time"]:focus{border-color:rgba(243,156,18,.6)}
  .debug-panel button{
    background:rgba(243,156,18,.15);
    border:1px solid rgba(243,156,18,.35);
    color:#f39c12;
    padding:5px 14px;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
    font-family:inherit;
    transition:background .2s;
  }
  .debug-panel button:hover{background:rgba(243,156,18,.28)}
  .debug-badge{
    position:fixed;
    top:8px;
    right:12px;
    background:rgba(243,156,18,.2);
    color:#f39c12;
    font-size:11px;
    padding:2px 8px;
    border-radius:4px;
    letter-spacing:.5px;
    z-index:99;
  }

  .timeline{
    width:100%;
    max-width:520px;
    position:relative;
    padding-left:28px;
  }
  .timeline::before{
    content:'';
    position:absolute;
    left:9px;
    top:0;
    bottom:0;
    width:2px;
    background:#1e2a3a;
    border-radius:1px;
  }
  .phase{
    position:relative;
    padding:14px 20px;
    margin-bottom:4px;
    border-radius:12px;
    transition:all .4s ease;
    cursor:default;
  }
  .phase .dot{
    position:absolute;
    left:-23px;
    top:50%;
    transform:translateY(-50%);
    width:12px;
    height:12px;
    border-radius:50%;
    border:2px solid #1e2a3a;
    background:#0a0e17;
    transition:all .4s ease;
    z-index:1;
  }

  .phase.past{opacity:.35}
  .phase.past .dot{background:#2d3436;border-color:#2d3436}
  .phase.past .phase-time{color:#fff;background:rgba(255,255,255,.02)}
  .phase.past .phase-name{color:#4a5568}
  .phase.past .phase-countdown{color:#4a5568}

  .phase.active{
    background:rgba(231,76,60,.08);
    border:1px solid rgba(231,76,60,.2);
  }
  .phase.active .dot{
    background:#e74c3c;
    border-color:#e74c3c;
    box-shadow:0 0 12px rgba(231,76,60,.6);
    animation:pulse-red 1.5s ease-in-out infinite;
  }
  .phase.active .phase-name{color:#f5f6fa;font-weight:600}
  .phase.active .phase-time{color:#fff;background:rgba(231,76,60,.25)}
  .phase.active .phase-countdown{color:#e74c3c;font-weight:700}
  .phase.active .progress-bar{display:block;background:rgba(231,76,60,.1)}
  .phase.active .progress-fill{background:linear-gradient(90deg,#e74c3c,#f39c12)}

  .phase.active-pause{
    background:rgba(86,140,224,.08);
    border:1px solid rgba(86,140,224,.2);
  }
  .phase.active-pause .dot{
    background:#568ce0;
    border-color:#568ce0;
    box-shadow:0 0 12px rgba(86,140,224,.6);
    animation:pulse-blue 1.5s ease-in-out infinite;
  }
  .phase.active-pause .phase-name{color:#f5f6fa;font-weight:600}
  .phase.active-pause .phase-time{color:#fff;background:rgba(86,140,224,.25)}
  .phase.active-pause .phase-countdown{color:#568ce0;font-weight:700}
  .phase.active-pause .progress-bar{display:block;background:rgba(86,140,224,.1)}
  .phase.active-pause .progress-fill{background:linear-gradient(90deg,#568ce0,#74b9ff)}

  .phase.future{opacity:.45}
  .phase.future .dot{background:#1e2a3a;border-color:#2d3d50}
  .phase.future .phase-time{color:#fff;background:rgba(255,255,255,.03)}
  .phase.future .phase-name{color:#4a6a8a}
  .phase.future .phase-countdown{color:#4a6a8a}

  @keyframes pulse-red{
    0%,100%{box-shadow:0 0 8px rgba(231,76,60,.4)}
    50%{box-shadow:0 0 20px rgba(231,76,60,.8)}
  }
  @keyframes pulse-blue{
    0%,100%{box-shadow:0 0 8px rgba(86,140,224,.4)}
    50%{box-shadow:0 0 20px rgba(86,140,224,.8)}
  }

  .phase-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .phase-left{display:flex;align-items:center;gap:12px;min-width:0}
  .phase-time{
    font-size:13px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    min-width:42px;
    color:#fff;
    background:rgba(255,255,255,.06);
    padding:2px 8px;
    border-radius:4px;
    font-weight:500;
    letter-spacing:.5px;
  }
  .phase-name{
    font-size:15px;
    color:#a0aec0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .phase-countdown{
    font-size:13px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    color:#636e72;
    min-width:70px;
    text-align:right;
  }

  .progress-bar{
    margin-top:8px;
    height:3px;
    border-radius:2px;
    background:rgba(231,76,60,.1);
    overflow:hidden;
    display:none;
  }
  .phase.active .progress-bar{display:block}
  .progress-fill{
    height:100%;
    border-radius:2px;
    background:linear-gradient(90deg,#e74c3c,#f39c12);
    transition:width 1s linear;
  }

  .weekend-note{
    text-align:center;
    color:#636e72;
    font-size:15px;
    margin-top:40px;
    line-height:1.8;
  }
  .weekend-note span{color:#f39c12}

  @media(max-width:480px){
    h1{font-size:22px}
    .clock{font-size:34px}
    .phase{padding:10px 14px}
    .phase-name{font-size:13px}
    .phase-time{font-size:12px}
    .phase-countdown{font-size:12px;min-width:60px}
    .debug-panel{padding:8px 12px;gap:8px}
  }
</style>
</head>
<body>

<h1>交易倒计时</h1>
<div class="subtitle" id="subtitle">上海证券交易所 · 深圳证券交易所</div>
<div id="debugContainer"></div>
<div class="clock" id="clock">--:--:--</div>
<div class="date-info" id="dateInfo">----年--月--日 星期-</div>
<div class="market-status" id="marketStatus">加载中...</div>

<div class="timeline" id="timeline"></div>

<script>
const PHASES = [
  { start: '09:15', end: '09:20', name: '集合竞价 · 可撤单', desc: '开放式集合竞价，可自由申报和撤单', status: 'auction' },
  { start: '09:20', end: '09:25', name: '集合竞价 · 不可撤单', desc: '仅可申报，不可撤单', status: 'auction' },
  { start: '09:25', end: '09:30', name: '竞价撮合', desc: '交易所撮合产生开盘价', status: 'pause' },
  { start: '09:30', end: '11:30', name: '早盘连续交易', desc: '上午连续竞价交易时段', status: 'trading' },
  { start: '11:30', end: '13:00', name: '午间休市', desc: '中场休息，暂停交易', status: 'pause' },
  { start: '13:00', end: '14:57', name: '午盘连续交易', desc: '下午连续竞价交易时段', status: 'trading' },
  { start: '14:57', end: '15:00', name: '尾盘集合竞价', desc: '收盘集合竞价，不可撤单', status: 'auction' },
  { start: '15:00', end: null,    name: '收盘', desc: '全天交易结束', status: 'closed' },
];

const urlParams = new URLSearchParams(window.location.search);
const debugMode = urlParams.has('d');
let debugOffset = 0;

function getRealChinaTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 3600000);
}

function getChinaTime() {
  const real = getRealChinaTime();
  if (debugOffset !== 0) return new Date(real.getTime() + debugOffset);
  return real;
}

function timeToSeconds(t) {
  const parts = t.split(':').map(Number);
  return parts[0] * 3600 + parts[1] * 60 + (parts[2] || 0);
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatCountdown(totalSeconds) {
  if (totalSeconds <= 0) return '已结束';
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  if (m > 0) return `${m}:${pad(s)}`;
  return `${s}秒`;
}

const weekDays = ['日','一','二','三','四','五','六'];

function isWeekend(d) {
  const day = d.getDay();
  return day === 0 || day === 6;
}

function initDebug() {
  if (!debugMode) return;
  const badge = document.createElement('div');
  badge.className = 'debug-badge';
  badge.textContent = 'DEBUG';
  document.body.appendChild(badge);

  const container = document.getElementById('debugContainer');
  container.innerHTML = `
    <div class="debug-panel">
      <label>设置时间：</label>
      <input type="time" id="debugTime" step="1">
      <button id="debugSet">应用</button>
      <button id="debugReset">重置</button>
    </div>
  `;

  const chinaTime = getRealChinaTime();
  document.getElementById('debugTime').value =
    `${pad(chinaTime.getHours())}:${pad(chinaTime.getMinutes())}:${pad(chinaTime.getSeconds())}`;

  document.getElementById('debugSet').addEventListener('click', () => {
    const val = document.getElementById('debugTime').value;
    if (!val) return;
    const parts = val.split(':').map(Number);
    const targetDaySec = parts[0] * 3600 + parts[1] * 60 + (parts[2] || 0);
    const realNow = getRealChinaTime();
    const realDaySec = realNow.getHours() * 3600 + realNow.getMinutes() * 60 + realNow.getSeconds();
    debugOffset = (targetDaySec - realDaySec) * 1000;
  });

  document.getElementById('debugReset').addEventListener('click', () => {
    debugOffset = 0;
    const chinaTime = getRealChinaTime();
    document.getElementById('debugTime').value =
      `${pad(chinaTime.getHours())}:${pad(chinaTime.getMinutes())}:${pad(chinaTime.getSeconds())}`;
  });
}

function buildTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';
  PHASES.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'phase future';
    div.id = `phase-${i}`;
    const timeLabel = p.end ? `${p.start}~${p.end}` : p.start;
    div.innerHTML = `
      <div class="dot"></div>
      <div class="phase-header">
        <div class="phase-left">
          <span class="phase-time">${timeLabel}</span>
          <span class="phase-name">${p.name}</span>
        </div>
        <span class="phase-countdown" id="cd-${i}">--:--</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pf-${i}"></div></div>
    `;
    div.title = p.desc;
    container.appendChild(div);
  });
}

function update() {
  const now = getChinaTime();
  const clockEl = document.getElementById('clock');
  const dateEl = document.getElementById('dateInfo');
  const statusEl = document.getElementById('marketStatus');

  clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  dateEl.textContent = `${now.getFullYear()}年${pad(now.getMonth()+1)}月${pad(now.getDate())}日 星期${weekDays[now.getDay()]}`;

  const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
  const weekend = isWeekend(now) && !debugMode;

  if (weekend) {
    statusEl.textContent = '周末休市';
    statusEl.className = 'market-status status-closed';
    PHASES.forEach((_, i) => {
      document.getElementById(`phase-${i}`).className = 'phase past';
      document.getElementById(`cd-${i}`).textContent = '休市';
    });
    return;
  }

  let activeIdx = -1;
  for (let i = 0; i < PHASES.length; i++) {
    const p = PHASES[i];
    const startSec = timeToSeconds(p.start);
    const endSec = p.end ? timeToSeconds(p.end) : null;
    if (endSec !== null && nowSec >= startSec && nowSec < endSec) {
      activeIdx = i;
      break;
    }
  }

  const STATUS_MAP = {
    trading: ['交易中', 'market-status status-trading'],
    auction: ['竞价中', 'market-status status-auction'],
    pause:   ['暂停交易', 'market-status status-break'],
    closed:  ['今日已收盘', 'market-status status-closed'],
  };

  if (activeIdx !== -1) {
    const [label, cls] = STATUS_MAP[PHASES[activeIdx].status];
    statusEl.textContent = label;
    statusEl.className = cls;
  } else if (nowSec < timeToSeconds(PHASES[0].start)) {
    statusEl.textContent = '盘前等待';
    statusEl.className = 'market-status status-closed';
  } else {
    statusEl.textContent = '今日已收盘';
    statusEl.className = 'market-status status-closed';
  }

  PHASES.forEach((p, i) => {
    const el = document.getElementById(`phase-${i}`);
    const cdEl = document.getElementById(`cd-${i}`);
    const startSec = timeToSeconds(p.start);
    const endSec = p.end ? timeToSeconds(p.end) : null;

    if (i === activeIdx) {
      el.className = p.status === 'pause' ? 'phase active-pause' : 'phase active';
      const remaining = endSec - nowSec;
      cdEl.textContent = formatCountdown(Math.max(0, remaining));
      const total = endSec - startSec;
      const elapsed = nowSec - startSec;
      const progress = Math.min(100, Math.max(0, (elapsed / total) * 100));
      const pf = document.getElementById(`pf-${i}`);
      if (pf) pf.style.width = progress + '%';
    } else if (
      (endSec !== null && nowSec >= endSec) ||
      (endSec === null && nowSec >= startSec)
    ) {
      el.className = 'phase past';
      cdEl.textContent = '已结束';
    } else {
      el.className = 'phase future';
      const remaining = startSec - nowSec;
      cdEl.textContent = formatCountdown(Math.max(0, remaining));
    }
  });
}

initDebug();
buildTimeline();
update();
setInterval(update, 300);
</script>

</body>
</html>
